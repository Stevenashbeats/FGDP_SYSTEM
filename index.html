<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>FGDP Pad</title>
<style>
  :root { color-scheme: dark; }
  body {
    background: #121212;
    display: grid;
    place-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: ui-sans-serif, system-ui, sans-serif;
    color: #ddd;
  }
  .pad-svg { width: min(90vw, 720px); height: auto; }
  .btn {
    cursor: pointer;
    pointer-events: all;
    transition: fill 120ms ease, stroke 120ms ease;
  }
  .btn.pad {
    fill: transparent;
    stroke: #cccccc;
    stroke-width: 0.992375;
    stroke-miterlimit: 10;
  }
  .btn.pad:hover {
    fill: rgba(108, 200, 255, 0.18);
    stroke: #ffffff;
  }
  .btn.pad.active {
    fill: rgba(108, 200, 255, 0.45);
    stroke: #6cc8ff;
  }
  .btn.key {
    fill: #cccccc;
    stroke: transparent;
  }
  .btn.key:hover {
    fill: #ffffff;
  }
  .btn.key.active {
    fill: #6cc8ff;
  }
  #log {
    margin-top: 16px;
    font-size: 13px;
    opacity: 0.7;
    min-height: 1.2em;
  }
</style>
</head>

    const log = document.getElementById('log');
    document.querySelectorAll('.btn').forEach(btn => {
